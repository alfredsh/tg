name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.36
          pip install buildozer==1.5.0

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        timeout-minutes: 60

      - name: Show last 50 lines of log
        if: always()
        run: tail -50 build.log || true

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TGSecretChat-debug
          path: bin/*.apk
          retention-days: 30

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TG Secret Chat v1.0.${{ github.run_number }}"
          files: bin/*.apk
