name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache \
            python3-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0

      - name: Set JAVA_HOME
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          java -version

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log || true
        timeout-minutes: 60

      - name: Show build result
        if: always()
        run: |
          echo "=== ПОСЛЕДНИЕ 100 СТРОК ЛОГА ==="
          tail -100 build.log || true
          echo "=== APK файлы ==="
          find . -name "*.apk" 2>/dev/null || echo "APK не найден"

      - name: Upload log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TGSecretChat-debug
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: hashFiles('bin/*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TG Secret Chat v1.0.${{ github.run_number }}"
          files: bin/*.apk
