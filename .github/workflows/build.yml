name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Права для создания Release
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Кеш — ускоряет повторные сборки с 30 мин до 5 мин
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_cache
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      # Используем готовый Docker-образ с Android SDK внутри
      # Это самый надёжный способ — всё уже предустановлено
      - name: Build APK via Docker
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: .
          buildozer_version: stable

      # Загружаем APK как артефакт (доступен 30 дней)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TGSecretChat-debug
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30

      # Создаём GitHub Release с APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TG Secret Chat v1.0.${{ github.run_number }}"
          body: "Автосборка APK через GitHub Actions"
          files: ${{ steps.buildozer.outputs.filename }}
