name: Build Android APK

# ── Когда запускается ──────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]          # При пуше в main
  workflow_dispatch:             # Или вручную через кнопку в GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04        # Ubuntu — оптимален для Buildozer

    steps:

      # ── Шаг 1: Получить код из репозитория ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Шаг 2: Установить Python ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Шаг 3: Кеширование (ускоряет повторные сборки с ~30 мин до ~5) ──
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('buildozer.spec') }}

      # ── Шаг 4: Системные зависимости для Buildozer ───────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            python3-pip

      # ── Шаг 5: Установить Buildozer + Cython ─────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      # ── Шаг 6: Собрать APK ───────────────────────────────────────────────
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      # ── Шаг 7: Найти собранный APK ───────────────────────────────────────
      - name: Find APK
        run: find . -name "*.apk" -type f

      # ── Шаг 8: Загрузить APK как артефакт (скачать из GitHub) ────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TGSecretChat-debug.apk
          path: bin/*.apk
          retention-days: 30          # Хранить 30 дней

      # ── Шаг 9 (опционально): Создать GitHub Release ──────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TG Secret Chat v1.0.${{ github.run_number }}"
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
